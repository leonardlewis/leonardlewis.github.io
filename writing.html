<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Leonard Lewis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a18;
      --paper: #ffffff;
      --accent: #c44d28;
      --muted: #7a756b;
      --rule: #d4cdc0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-weight: 300;
      line-height: 1.7;
      font-size: 17px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      padding: 2.5rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .back {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .back:hover { color: var(--ink); text-decoration: none; }

    h1 {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 3rem 0 2rem;
    }

    .item {
      padding: 1.25rem 0;
    }

    .item h3 {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
    }

    footer {
      padding: 3rem 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="site-name" style="color:var(--ink);text-decoration:none;">Leonard Lewis</a>
      <a href="index.html" class="back">← Back</a>
    </header>

    <h1>Writing</h1>

    <div class="item">
      <h3>Coming soon...</h3>
    </div>

    <footer>&copy; 2026 Leonard Lewis</footer>
  </div>
</body>
</html>
